<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}spotfm{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><strong><a href="/">spotfm</a></strong></li>
      </ul>
      <ul>
        <li><a href="/playlists">Playlists</a></li>
        <li><a href="/tracks">Tracks</a></li>
        <li><a href="/duplicates">Dupes</a></li>
        <li><a href="/scrobbles">Scrobbles</a></li>
        <li><a href="/track-counts">Track Counts</a></li>
        <li>
          <form action="/logout" method="post" style="margin:0">
            <button type="submit" class="outline secondary">Logout</button>
          </form>
        </li>
      </ul>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
